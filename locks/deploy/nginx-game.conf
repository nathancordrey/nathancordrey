# /etc/nginx/sites-available/locks-game
# Separate vhost for the game server (game.nathancordrey.com).
# Note: proxy_params does NOT include the WebSocket upgrade headers,
# so they are set explicitly here.
server {
    listen 80;
    server_name game.nathancordrey.com;

    location / {
        proxy_pass http://127.0.0.1:2567;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
# After enabling: sudo certbot --nginx -d game.nathancordrey.com
# (certbot rewrites this block for 443/TLS, same as your main site)
