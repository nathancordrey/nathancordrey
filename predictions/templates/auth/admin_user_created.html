{% extends "base.html" %}
{% block title %}User created · Admin{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="card-inner">
    <div class="eyebrow">Admin</div>
    <h1>User ready</h1>
    <p><strong>{{ created.name }}</strong> can log in with this temporary password:</p>
    <div class="temp">{{ temp_password }}</div>
    <p class="muted">Save and share it now — it can't be recovered later.</p>
    <div class="links">
      <a href="{{ url_for('auth.admin_create_user') }}">Create another</a>
      <a href="{{ url_for('admin.results') }}">← Back to admin</a>
    </div>
  </div>
</div>
{% endblock %}
