{% extends "base.html" %}
{% block title %}Log in · Predictions{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="card-inner">
    <div class="eyebrow">Prediction League</div>
    <h1>Log in</h1>
    <form method="post" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="name">Name</label>
      <input id="name" name="name" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
